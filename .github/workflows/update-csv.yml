name: harvest-final-prices

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1,4"

permissions:
  contents: write

concurrency:
  group: harvest-final-prices
  cancel-in-progress: false

jobs:
  run-harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-harvest-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-harvest-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Python environment
        run: |
          python --version
          pip --version
          pip list

      - name: Run harvester
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          ENABLE_KAGGLE: ${{ secrets.ENABLE_KAGGLE }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
        run: |
          python harvest_history.py

      - name: Upload checkpoints artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harvest-checkpoints
          path: |
            checkpoints/
            cars.csv
            master.csv
            rotation_state.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit updated files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cars.csv master.csv rotation_state.json checkpoints/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update harvested vehicle data"
          git push
