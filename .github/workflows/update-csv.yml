name: Update CSV

on:
  workflow_dispatch:
  schedule:
    # Runs at :37 every hour — adjust cron here if your schedule changes
    - cron: "37 * * * *"

concurrency:
  group: update-csv-main
  cancel-in-progress: false

jobs:
  update-csv:
    runs-on: ubuntu-latest
    timeout-minutes: 55       # hard cap so it never overlaps the next hourly run
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync with remote
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase origin main

      - name: Install dependencies
        run: |
          pip install playwright pandas
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          python main.py

      - name: Commit and push updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage both output files
          git add cars.csv master.csv

          if git diff --staged --quiet; then
            echo "No changes to commit — no new auction data found."
            exit 0
          fi

          # Count new rows for a meaningful commit message
          NEW_ROWS=$(python3 -c "
          import pandas as pd, sys
          try:
            df = pd.read_csv('cars.csv')
            print(len(df))
          except:
            print('?')
          ")

          git commit -m "Auto update: ${NEW_ROWS} total rows in cars.csv [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin main
