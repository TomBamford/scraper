name: Harvest Historical Sale Prices

on:
  schedule:
    # Run every Sunday at 9:00 AM UTC
    # Each run fetches 30 days of Rebrowser data + looks up up to 500 final prices
    # Over time this builds a large comp database in cars.csv
    - cron: '0 9 * * 0'
  workflow_dispatch:  # Manual trigger from Actions tab

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pyarrow beautifulsoup4

      - name: Run harvester
        run: python harvest_history.py

      - name: Commit updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cars.csv master.csv
          git diff --staged --quiet || git commit -m "auto: harvest $(date -u +'%Y-%m-%d') — new priced records"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
