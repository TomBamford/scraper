name: Harvest Final Prices (ScraperAPI)

on:
  schedule:
    - cron: '0 8 1 * *'   # 1st of every month
  workflow_dispatch:

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install git-lfs
        run: |
          sudo apt-get install -y git-lfs
          git lfs install

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp pandas pyarrow beautifulsoup4 lxml

      - name: Run harvester
        env:
          SCRAPER_API_KEY:  ${{ secrets.SCRAPER_API_KEY }}
          REBROWSER_DAYS:   "30"
          TOTAL_REQUESTS:   "4800"
          CONCURRENCY:      "20"
          REQUEST_TIMEOUT:  "60"
          PROGRESS_EVERY:   "100"
          MAX_RUNTIME_SEC:  "3000"
        run: python harvest_final_prices.py

      - name: Commit results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cars.csv master.csv checkpoint_*.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: harvest $(date -u +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
